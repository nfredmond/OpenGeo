# OpenGeo local development stack.
# - postgres: PostGIS 15 + pgvector for tenant data.
# - martin: Rust vector tile server; reads PostGIS directly on :3001.
# - titiler: raster tile server for COGs on :8000.
# - pg_featureserv: OGC API Features on :9000.
# - nodeodm: OpenDroneMap processing node on :3002 (host) -> 3000 (container).
#
# Bring up: `docker compose up -d`
# Tear down (preserve volumes): `docker compose down`
# Tear down (delete data): `docker compose down -v`

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: opengeo-postgres:15-3.4-pgvector
    container_name: opengeo-postgres
    environment:
      POSTGRES_USER: opengeo
      POSTGRES_PASSWORD: opengeo
      POSTGRES_DB: opengeo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengeo -d opengeo"]
      interval: 5s
      timeout: 3s
      retries: 20

  martin:
    # Upstream moved to monorepo-style GitHub Release tags (e.g. `martin-v1.5.0`)
    # that aren't mirrored 1:1 into GHCR. `v0.20.0` no longer resolves.
    # Pin `latest` until upstream stabilizes versioned GHCR tags.
    image: ghcr.io/maplibre/martin:latest
    container_name: opengeo-martin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://opengeo:opengeo@postgres:5432/opengeo
      RUST_LOG: info
    ports:
      - "3001:3000"
    command: ["--listen-addresses", "0.0.0.0:3000"]

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: opengeo-titiler
    environment:
      PORT: "8000"
      WORKERS_PER_CORE: "1"
    ports:
      - "8000:8000"

  pg_featureserv:
    image: pramsey/pg_featureserv:latest
    container_name: opengeo-pgfeatureserv
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://opengeo:opengeo@postgres:5432/opengeo
      PGFS_SERVER_HTTPPORT: "9000"
    ports:
      - "9000:9000"

  nodeodm:
    image: opendronemap/nodeodm:latest
    container_name: opengeo-nodeodm
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - nodeodm-data:/var/www/data

  pmtiles_generator:
    build:
      context: ./services/pmtiles-generator
      dockerfile: Dockerfile
    image: opengeo-pmtiles-generator:latest
    container_name: opengeo-pmtiles-generator
    profiles: ["pmtiles"]
    environment:
      PORT: "8110"
      TIPPECANOE_BIN: tippecanoe
      # Leave PMTILES_GENERATOR_TOKEN unset in dev so auth is skipped.
    ports:
      - "8110:8110"

  # AI feature extractor (CPU-only dev image). LangSAM + GroundingDINO over
  # FastAPI. Not started by default — `docker compose --profile extractor up`
  # pulls this. Torch + GDAL + samgeo is a multi-GB image.
  # Production deploys to Modal; see services/extractor/README.md.
  extractor:
    build:
      context: ./services/extractor
      dockerfile: Dockerfile.cpu
    image: opengeo-extractor:cpu
    container_name: opengeo-extractor
    profiles: ["extractor"]
    environment:
      OPENGEO_LOG_LEVEL: INFO
      OPENGEO_DEVICE: cpu
      # Leave OPENGEO_EXTRACTOR_TOKEN unset in dev so auth is skipped.
    ports:
      - "8100:8100"

volumes:
  pgdata:
  nodeodm-data:
