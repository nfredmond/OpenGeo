name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # End-to-end check on the geo doctor CLI plumbing. The unit tests in
      # tests/unit/env-doctor.test.ts cover runEnvDoctor() directly; this step
      # additionally exercises `pnpm geo doctor` as a subprocess — catches
      # regressions in the CLI argv parsing, exit codes, and JSON output
      # shape that unit tests can't see.
      - name: Env doctor — happy path (preview, core scope)
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-fixture
          SUPABASE_SERVICE_ROLE_KEY: service-fixture
          SUPABASE_DB_URL: postgresql://postgres:x@example.supabase.co:5432/postgres
          OPENGEO_EXTRACTOR: mock
          FEATURE_AI_NL_SQL: "false"
          FEATURE_AI_STYLE_GEN: "false"
          FEATURE_AI_FEATURE_EXTRACTION: "false"
          FEATURE_DRONE_PIPELINE: "false"
          FEATURE_DURABLE_PIPELINE: "false"
        run: |
          report=$(pnpm -s geo doctor --target=preview --scope=core --json)
          echo "$report"
          ok=$(echo "$report" | jq -r '.ok')
          if [ "$ok" != "true" ]; then
            echo "expected ok=true, got $ok"
            exit 1
          fi

      - name: Env doctor — negative path fails when a required key is missing
        env:
          # Deliberately omit NEXT_PUBLIC_SUPABASE_URL to prove the gate fails closed.
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-fixture
          SUPABASE_SERVICE_ROLE_KEY: service-fixture
          OPENGEO_EXTRACTOR: mock
          FEATURE_AI_NL_SQL: "false"
          FEATURE_AI_STYLE_GEN: "false"
          FEATURE_AI_FEATURE_EXTRACTION: "false"
          FEATURE_DRONE_PIPELINE: "false"
          FEATURE_DURABLE_PIPELINE: "false"
        run: |
          set +e
          pnpm -s geo doctor --target=preview --scope=core --json > /dev/null
          code=$?
          set -e
          if [ "$code" = "0" ]; then
            echo "env doctor should have failed with a missing required key, but exited 0"
            exit 1
          fi
          echo "env doctor correctly failed with exit code $code"

  vercel-env-inventory:
    name: Vercel env inventory
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Verify Vercel env keys
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing GitHub secret VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret VERCEL_PROJECT_ID" && exit 1)
          node <<'NODE'
          const token = process.env.VERCEL_TOKEN;
          const projectId = process.env.VERCEL_PROJECT_ID;
          const orgId = process.env.VERCEL_ORG_ID;
          const required = [
            "NEXT_PUBLIC_SUPABASE_URL",
            "NEXT_PUBLIC_SUPABASE_ANON_KEY",
            "SUPABASE_SERVICE_ROLE_KEY",
            "SUPABASE_DB_URL",
            "OPENGEO_EXTRACTOR",
            "FEATURE_AI_NL_SQL",
            "FEATURE_AI_STYLE_GEN",
            "FEATURE_AI_FEATURE_EXTRACTION",
            "FEATURE_DRONE_PIPELINE",
            "FEATURE_DURABLE_PIPELINE",
            "R2_ACCOUNT_ID",
            "R2_ACCESS_KEY_ID",
            "R2_SECRET_ACCESS_KEY",
            "R2_BUCKET",
            "R2_PUBLIC_BASE_URL",
            "PMTILES_GENERATOR_URL",
            "PMTILES_GENERATOR_TOKEN",
            "ANTHROPIC_API_KEY",
            "ANTHROPIC_MODEL",
          ];
          const res = await fetch(
            `https://api.vercel.com/v10/projects/${projectId}/env?teamId=${orgId}`,
            { headers: { authorization: `Bearer ${token}` } },
          );
          if (!res.ok) {
            console.error(`Vercel env API failed: HTTP ${res.status}`);
            process.exit(1);
          }
          const body = await res.json();
          const envs = Array.isArray(body.envs) ? body.envs : [];
          const missing = [];
          for (const target of ["production", "preview"]) {
            for (const key of required) {
              const found = envs.some((env) => {
                const targets = Array.isArray(env.target) ? env.target : [env.target];
                return env.key === key && targets.includes(target) && !env.gitBranch;
              });
              if (!found) missing.push(`${target}:${key}`);
            }
          }
          const report = {
            ok: missing.length === 0,
            targets: ["production", "preview"],
            requiredKeyCount: required.length,
            missing,
          };
          console.log(JSON.stringify(report, null, 2));
          if (missing.length > 0) process.exit(1);
          NODE
