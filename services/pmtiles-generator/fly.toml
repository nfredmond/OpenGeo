# Fly.io app config for the hosted PMTiles generator.
# Keep primary_region close to the hosted Supabase project when possible.

app = "opengeo-pmtiles-generator-natford"
primary_region = "sjc"

[build]
  image = "ghcr.io/nfredmond/opengeo-pmtiles-generator:sha-b61ee31"

[env]
  NODE_ENV = "production"
  PORT = "8110"
  TIPPECANOE_BIN = "tippecanoe"
  PMTILES_GENERATOR_MAX_BODY_BYTES = "104857600"

[http_service]
  internal_port = 8110
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
